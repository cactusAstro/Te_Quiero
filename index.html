<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te quiero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .tq {
    position: absolute;
    font-family: 'Poppins', sans-serif;
    color: #fff;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 2px;
    white-space: nowrap;
    text-shadow:
      0 0 12px #ff1744,
      0 0 28px #ff1744;
    opacity: 0;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: fade 5s infinite ease-in-out;
  }

  .tq .emoji {
    text-shadow: none;
    font-size: 28px;
    margin: 0 8px;
    vertical-align: middle;
  }

  @keyframes fade {
    0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
    50%      { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
</style>
</head>
<body>
<div id="stage"></div>

<script>
const stage = document.getElementById('stage');
const W = window.innerWidth;
const H = window.innerHeight;
const CX = W / 2;
const CY = H / 2;

// ⭐ Corazón GRANDE — ocupa casi toda la pantalla
const SCALE = Math.min(W, H) / 22;

function heartPoint(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
  };
}

const SAMPLES = 4000;
const pts = [];
for (let i = 0; i < SAMPLES; i++) {
  const t = (i / SAMPLES) * Math.PI * 2;
  pts.push(heartPoint(t));
}
const cum = [0];
for (let i = 1; i < pts.length; i++) {
  const dx = pts[i].x - pts[i-1].x;
  const dy = pts[i].y - pts[i-1].y;
  cum.push(cum[i-1] + Math.sqrt(dx*dx + dy*dy));
}
const total = cum[cum.length - 1];

// 16 frases — bien repartidas en un corazón grande
const N = 16;
const CYCLE = 5;

const TEXT = '<span class="emoji">🤍</span>TE QUIERO<span class="emoji">❤️</span>';

for (let i = 0; i < N; i++) {
  const targetLen = (i / N) * total;
  let lo = 0, hi = cum.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (cum[mid] < targetLen) lo = mid + 1;
    else hi = mid;
  }
  const p = pts[lo];

  const el = document.createElement('div');
  el.className = 'tq';
  el.innerHTML = TEXT;
  el.style.left = (CX + p.x * SCALE) + 'px';
  el.style.top  = (CY + p.y * SCALE) + 'px';

  const phase = i / N;
  const delay = (phase - 1) * CYCLE;
  el.style.animationDelay = delay.toFixed(3) + 's';

  stage.appendChild(el);
}
</script>
</body>
</html>
